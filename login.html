<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión - IronLog</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#f97316" />
</head>
<body class="auth-body">

  <div class="auth-container">
    <a href="index.html" class="auth-brand">
      <span class="landing-logo-icon">IL</span>
      <span>IronLog</span>
    </a>

    <div class="auth-card">
      <h1 class="auth-title">Bienvenido de nuevo</h1>
      <p class="auth-subtitle">Inicia sesión para continuar</p>

      <form id="login-form" class="auth-form" novalidate>
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="tu@email.com"
            autocomplete="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Contraseña</label>
          <div class="input-password-wrap">
            <input
              type="password"
              id="password"
              name="password"
              class="form-input"
              placeholder="••••••••"
              autocomplete="current-password"
              required
            />
            <button type="button" class="toggle-password" aria-label="Mostrar contraseña" data-target="password">
              <svg class="eye-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <div id="login-error" class="form-error" hidden></div>

        <button type="submit" id="login-btn" class="btn-primary btn-block">
          <span id="login-btn-text">Iniciar sesión</span>
          <span id="login-btn-spinner" class="btn-spinner" hidden></span>
        </button>
      </form>

      <p class="auth-link-row">
        <a href="#" class="auth-link text-muted">¿Olvidaste tu contraseña?</a>
      </p>
    </div>

    <p class="auth-switch">
      ¿No tienes cuenta?
      <a href="register.html" class="auth-link">Regístrate</a>
    </p>
  </div>

  <script type="module">
    import { authAPI } from './js/api.js';

    const form     = document.getElementById('login-form');
    const errorBox = document.getElementById('login-error');
    const btnText  = document.getElementById('login-btn-text');
    const spinner  = document.getElementById('login-btn-spinner');
    const btn      = document.getElementById('login-btn');

    document.querySelectorAll('.toggle-password').forEach(function (toggleBtn) {
      toggleBtn.addEventListener('click', function () {
        const input = document.getElementById(toggleBtn.dataset.target);
        input.type = input.type === 'password' ? 'text' : 'password';
        toggleBtn.setAttribute('aria-label', input.type === 'password' ? 'Mostrar contraseña' : 'Ocultar contraseña');
      });
    });

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.hidden = false;
    }

    function setLoading(loading) {
      btn.disabled  = loading;
      btnText.hidden  = loading;
      spinner.hidden  = !loading;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errorBox.hidden = true;

      const email    = form.email.value.trim();
      const password = form.password.value;

      if (!email || !password) {
        showError('Por favor, completa todos los campos.');
        return;
      }

      setLoading(true);
      try {
        const data = await authAPI.login(email, password);
        localStorage.setItem('gymapp_token', data.token);
        localStorage.setItem('gymapp_user', JSON.stringify(data.user));
        window.location.replace('app.html');
      } catch (err) {
        showError(err.error || 'Error al iniciar sesión. Inténtalo de nuevo.');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
